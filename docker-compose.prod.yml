# Production stack: Postgres + API + Nginx (SPA + /api reverse proxy).
# Usage: cp env.deploy.example .env && edit .env
#        docker compose -f docker-compose.prod.yml --env-file .env up --build -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erpdb}
      POSTGRES_USER: ${POSTGRES_USER:-erpuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erpuser} -d ${POSTGRES_DB:-erpdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?missing_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:?missing_JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      TRUST_PROXY: "true"
      HTTP_LOGS: ${HTTP_LOGS:-false}
    ports:
      - "${BACKEND_PORT:-3000}:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:

